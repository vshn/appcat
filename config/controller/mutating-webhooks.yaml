---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-gateway-networking-x-k8s-io-v1alpha1-xlistenerset
  failurePolicy: Fail
  name: mxlistenerset.kb.io
  rules:
  - apiGroups:
    - gateway.networking.x-k8s.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    resources:
    - xlistenersets
  sideEffects: None
